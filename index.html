<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini App</title>

<link rel="stylesheet" href="style.css">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div>👋 Привет</div>
    <div class="balance">0 TON</div>
</div>

<!-- ГЛАВНАЯ -->
<div id="home" class="page active">
    <div class="card free" onclick="openPage('free')">🎁 Бесплатно</div>
    <div class="card roulette" onclick="openPage('roulette')">⭐ Рулетка</div>
</div>

<!-- FREE -->
<div id="free" class="page">
    <h2>🎁 Бесплатный кейс</h2>

    <div class="case-box">
        <div id="case">🎁</div>
    </div>

    <div id="free-result">Нажми открыть</div>
    <button class="open-btn" onclick="openCase()">Открыть</button>
</div>

<!-- ROULETTE -->
<div id="roulette" class="page">
    <h2>🎰 Рулетка</h2>
    <div id="result">Нажми крутить</div>
    <button onclick="spin()">Крутить</button>
</div>

<!-- PROFILE -->
<div id="profile" class="page">

    <div class="profile-card">
        <img id="avatar" class="avatar">
        <div id="username">@user</div>

        <div class="stats">
            <div>
                <div id="games">0</div>
                <span>Games</span>
            </div>
            <div>
                <div id="best">0 TON</div>
                <span>Best win</span>
            </div>
        </div>
    </div>

    <button class="invite-btn" onclick="invite()">Invite friends +</button>

</div>

<!-- NAV -->
<div class="bottom-nav">
    <div onclick="openPage('home')">Кейсы</div>
    <div>Конкурсы</div>
    <div>Задания</div>
    <div>Лидеры</div>
    <div onclick="openPage('profile')">Профиль</div>
</div>

<script src="app.js"></script>

</body>
</html>
